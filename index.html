<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CISSP Exam Mastery Dashboard</title>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <!-- HTML sanitizer (defense-in-depth for rendered notes/quiz content) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <!-- KaTeX for natural LaTeX math rendering in study notes -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <!-- Custom CSS stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Backdrop shown behind the sidebar drawer on small screens -->
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- Sidebar: Course Roadmap -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>CISSP Mastery</h1>
        <p>Full Course Study Companion</p>
      </div>
      
      <!-- Progress Panel -->
      <div class="progress-panel">
        <div class="progress-meta">
          <span>Overall Progress</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
        <div class="progress-stats">
          <span id="progress-text">0 of 32 Completed</span>
        </div>
      </div>
      
      <!-- Video Playlist Menu -->
      <nav class="playlist-nav">
        <ul id="video-list">
          <!-- Populated by JavaScript -->
        </ul>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Active Video Header -->
      <header class="content-header">
        <div class="header-title">
          <button class="menu-toggle" id="menu-toggle" aria-label="Toggle course menu" aria-expanded="false" aria-controls="sidebar">
            <svg class="icon" viewBox="0 0 24 24"><path fill="currentColor" d="M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z" /></svg>
          </button>
          <span class="video-index-badge" id="active-video-index">Video 01</span>
          <h2 id="active-video-title">CISSP Full Course: Introduction</h2>
        </div>
        <div class="header-actions">
          <a href="#" id="youtube-link" target="_blank" class="btn btn-primary">
            <svg class="icon" viewBox="0 0 24 24"><path fill="currentColor" d="M23,12A11,11 0 0,0 12,1A11,11 0 0,0 1,12A11,11 0 0,0 12,23A11,11 0 0,0 23,12M10,8.5L16,12L10,15.5V8.5Z" /></svg>
            Watch on YouTube
          </a>
        </div>
      </header>

      <!-- Tabs Navigation -->
      <div class="tabs-nav">
        <button class="tab-btn active" data-tab="notes-tab">
          <svg class="icon" viewBox="0 0 24 24"><path fill="currentColor" d="M19,3H5C3.89,3 3,3.89 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5C21,3.89 20.1,3 19,3M19,5V19H5V5H19M7,7V9H17V7H7M7,11V13H17V11H7M7,15V17H14V15H7Z" /></svg>
          Study Notes
        </button>
        <button class="tab-btn" data-tab="quiz-tab" id="quiz-tab-btn">
          <svg class="icon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.9-1.9C9.22 19.58 10.57 20 12 20c4.97 0 9-4.03 9-9s-4.03-9-9-9zm1 14h-2v-2h2v2zm1.07-7.75l-.9.92C12.45 11.9 12 12.5 12 14h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z" /></svg>
          Practice Quiz
        </button>
      </div>

      <!-- Tab Panels -->
      <div class="tab-panels">
        <!-- Tab: Study Notes -->
        <section class="tab-panel active" id="notes-tab">
          <div class="card glass">
            <div id="markdown-content" class="markdown-body">
              <!-- Rendered Markdown goes here -->
            </div>
          </div>
        </section>

        <!-- Tab: Quiz -->
        <section class="tab-panel" id="quiz-tab">
          <!-- Quiz Status Bar -->
          <div class="quiz-status-bar card glass" id="quiz-results-banner" style="display: none;">
            <div class="result-meta">
              <h3>Quiz Results</h3>
              <p id="quiz-score-text">You scored 0 / 5 (0%)</p>
            </div>
            <div class="result-badge" id="quiz-status-badge">FAILED</div>
          </div>

          <div id="quiz-container">
            <!-- Questions rendered by JavaScript -->
          </div>

          <div class="quiz-actions" id="quiz-actions-container">
            <button id="submit-quiz-btn" class="btn btn-primary btn-lg">Submit Quiz</button>
            <button id="retry-quiz-btn" class="btn btn-secondary btn-lg" style="display: none;">Retry Quiz</button>
          </div>
        </section>
      </div>
    </main>
  </div>

  <!-- Load Global Data -->
  <script src="data.js"></script>
  <!-- Load App Logic -->
  <script src="app.js"></script>
</body>
</html>
